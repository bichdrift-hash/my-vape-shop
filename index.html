<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VapeDealer Shop</title>
    <!-- Подключаем скрипт Телеграма -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; background: #131314; color: #fff; padding: 15px; margin: 0; }
        
        /* Шапка бренда */
        .header { text-align: center; padding: 15px 0 10px 0; }
        .header h1 { margin: 0; font-size: 1.8em; color: #d4ff3b; }
        .header p { color: #8e8e93; margin: 5px 0 15px 0; font-size: 0.9em; }

        /* Верхняя панель с кнопками (Канал, Менеджер, Корзина) */
        .top-nav { display: grid; grid-template-columns: 1fr 1.2fr 1.2fr; gap: 8px; margin-bottom: 20px; }
        .nav-btn { 
            background: #222224; 
            color: #fff; 
            border: 1px solid #333; 
            padding: 10px 5px; 
            border-radius: 10px; 
            font-size: 0.85em; 
            font-weight: bold; 
            text-align: center; 
            text-decoration: none; 
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }
        .nav-btn.highlight { background: #d4ff3b; color: #000; border: none; }

        /* Поиск */
        .search-container { margin-bottom: 15px; }
        .search-input { 
            width: 100%; 
            padding: 12px 15px; 
            border-radius: 10px; 
            border: 1px solid #2e2e30; 
            background: #1e1e1f; 
            color: #fff; 
            box-sizing: border-box; 
            font-size: 0.95em; 
        }

        /* Фильтры наличия */
        .filters { display: flex; gap: 8px; margin-bottom: 20px; overflow-x: auto; padding-bottom: 5px; }
        .filter-btn { 
            background: #1e1e1f; 
            color: #8e8e93; 
            border: 1px solid #2e2e30; 
            padding: 8px 16px; 
            border-radius: 20px; 
            font-size: 0.85em; 
            cursor: pointer; 
            white-space: nowrap;
            font-weight: bold;
        }
        .filter-btn.active { background: #d4ff3b; color: #000; border: none; }

        /* Сетка каталога */
        .catalog { display: grid; grid-template-columns: 1fr; gap: 15px; }
        
        .product-card { 
            background: #1e1e1f; 
            border-radius: 16px; 
            overflow: hidden; 
            border: 1px solid #2e2e30; 
            display: flex; 
            flex-direction: column;
            transition: 0.2s;
        }
        
        /* Если товара нет в наличии, карточка слегка тускнеет */
        .product-card.out-of-stock { opacity: 0.5; }

        .product-img { 
            width: 100%; 
            height: 200px; 
            object-fit: cover; 
            background: #282829;
        }
        
        .product-info { padding: 15px; display: flex; flex-direction: column; flex-grow: 1; }
        
        .promo-badge { 
            background: #ff4757; 
            color: #fff; 
            font-size: 0.75em; 
            padding: 4px 8px; 
            border-radius: 6px; 
            align-self: flex-start;
            margin-bottom: 10px; 
            font-weight: bold;
        }
        
        .product-title { margin: 0 0 5px 0; font-size: 1.15em; color: #fff; }
        .product-desc { margin: 0 0 15px 0; font-size: 0.85em; color: #8e8e93; line-height: 1.4; }
        
        .price-row { display: flex; justify-content: space-between; align-items: center; margin-top: auto; }
        .price { color: #d4ff3b; font-weight: bold; font-size: 1.25em; margin: 0; }
        
        .btn { 
            background: #d4ff3b; 
            color: #000; 
            border: none; 
            padding: 10px 15px; 
            font-weight: bold; 
            border-radius: 8px; 
            cursor: pointer; 
            font-size: 0.9em; 
        }
        .btn.disabled { background: #333; color: #8e8e93; cursor: not-allowed; }
        
        /* Оформление корзины */
        .cart-section { margin-top: 40px; border-top: 1px solid #333; padding-top: 20px; padding-bottom: 40px; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #333; background: #1e1e1f; color: #fff; box-sizing: border-box; }
        .cart-item { display: flex; justify-content: space-between; background: #1e1e1f; padding: 12px; border-radius: 10px; margin-bottom: 8px; font-size: 0.9em; border: 1px solid #2e2e30; }
        .delete-btn { background: none; border: none; color: #ff4757; cursor: pointer; font-weight: bold; font-size: 1.1em; }
    </style>
</head>
<body>

    <div class="header">
        <h1>VapeDealer</h1>
        <p>Premium Liquids Shop</p>
    </div>

    <!-- ТРИ КНОПКИ (Канал, Менеджер, Корзина) -->
    <div class="top-nav">
        <!-- Укажи ссылку на свой телеграм-канал -->
        <a href="https://t.me/vape_dealermd" target="_blank" class="nav-btn">📢 Канал</a>
        <!-- Укажи ссылку на свой аккаунт менеджера -->
        <a href="https://t.me/ebywz" target="_blank" class="nav-btn highlight">💬 Менеджер</a>
        <!-- Кнопка плавно скроллит вниз к оформлению заказа -->
        <div onclick="scrollToCart()" class="nav-btn">🛒 Корзина (<span id="nav-cart-count">0</span>)</div>
    </div>

    <!-- ПОИСК ВКУСОВ -->
    <div class="search-container">
        <input type="text" id="search-input" class="search-input" placeholder="🔍 Поиск вкуса..." oninput="filterProducts()">
    </div>

    <!-- ФИЛЬТРЫ НАЛИЧИЯ -->
    <div class="filters">
        <button class="filter-btn active" id="btn-all" onclick="setFilter('all')">Все</button>
        <button class="filter-btn" id="btn-instock" onclick="setFilter('instock')">В наличии</button>
        <button class="filter-btn" id="btn-outofstock" onclick="setFilter('outofstock')">Нет в наличии</button>
    </div>
    
    <h2>Каталог Elfliq</h2>
    
    <!-- Сюда JavaScript будет сам выводить карточки товаров -->
    <div class="catalog" id="catalog-container"></div>

    <!-- Раздел Корзины -->
    <div id="cart-anchor" class="cart-section">
        <h3 style="border-bottom: 1px solid #333; padding-bottom: 10px;">🛒 Оформление заказа</h3>
        
        <div id="cart-list"></div>
        
        <p id="cart-total" style="font-weight: bold; font-size: 1.2em; text-align: right; color: #d4ff3b; margin: 15px 0;">Итого: 0 MDL</p>
        
        <label>📞 Контакт для связи (Телефон или Юзернейм):</label>
        <input type="text" id="contact" placeholder="+373 xx xx xx или @username">
        
        <label>🚚 Способ получения:</label>
        <select id="delivery" onchange="calculateTotal()">
            <option value="Самовывоз (Рышкановка)">Самовывоз (Рышкановка) — Бесплатно</option>
            <option value="Доставка по Кишиневу">Доставка по Кишиневу — +50 MDL</option>
        </select>
        
        <button class="btn" style="background: #9eff56; margin-top: 15px; padding: 15px; width: 100%; font-size: 1.1em;" onclick="sendOrder()">Подтвердить заказ →</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // --- БАЗА ДАННЫХ ТВОИХ ВКУСОВ ---
        // Тут ты можешь легко менять цены, добавлять новые вкусы, менять описание и статус наличия (true - есть, false - нет)
        const products = [
            {
                id: 1,
                name: "Elfliq - Green Grape Rose (30ml)",
                desc: "Невероятный микс сочного зеленого винограда с тонкими, изысканными нотками свежих лепестков розы.",
                img: "green_grape.jpg",
                inStock: true
            },
            {
                id: 2,
                name: "Elfliq - Pink Lemonade Soda (30ml)",
                desc: "Классический розовый лимонад с кубиками льда. Идеальный баланс спелой садовой малины и легкой лимонной кислинки.",
                img: "pink_lemonade.jpg",
                inStock: true
            },
            {
                id: 3,
                name: "Elfliq - Blueberry Raspberry Pomegranate (30ml)",
                desc: "Богатое лесное трио: спелая черника, сладкая малина и терпкий, благородный сок спелого граната.",
                img: "blueberry_pomegranate.jpg",
                inStock: true
            },
            {
                id: 4,
                name: "Elfliq - Blue Razz Lemonade (30ml)",
                desc: "Знаменитый вкус синей малины в сочетании с бодрящим, прохладным домашним лимонадом.",
                img: "blue_razz.jpg",
                inStock: false // Пример товара, которого нет в наличии
            }
        ];

        let cart = [];
        let currentFilter = 'all'; // Текущий фильтр наличия ('all', 'instock', 'outofstock')

        // Отрисовка товаров на экране
        function renderCatalog() {
            const container = document.getElementById('catalog-container');
            container.innerHTML = '';
            
            const searchQuery = document.getElementById('search-input').value.toLowerCase();

            products.forEach(product => {
                // Фильтр по поиску
                const matchesSearch = product.name.toLowerCase().includes(searchQuery);
                
                // Фильтр по наличию
                let matchesFilter = false;
                if (currentFilter === 'all') matchesFilter = true;
                else if (currentFilter === 'instock' && product.inStock) matchesFilter = true;
                else if (currentFilter === 'outofstock' && !product.inStock) matchesFilter = true;

                if (matchesSearch && matchesFilter) {
                    const card = document.createElement('div');
                    card.className = `product-card ${product.inStock ? '' : 'out-of-stock'}`;
                    
                    const badge = product.inStock 
                        ? `<span class="promo-badge">🔥 Акция: от 2-х шт по 170 MDL</span>` 
                        : `<span class="promo-badge" style="background: #555;">Нет в наличии</span>`;
                    
                    const buttonHtml = product.inStock 
                        ? `<button class="btn" onclick="addToCart('${product.name}')">В корзину</button>` 
                        : `<button class="btn disabled" disabled>Ожидается</button>`;

                    card.innerHTML = `
                        <img class="product-img" src="${product.img}" alt="${product.name}">
                        <div class="product-info">
                            ${badge}
                            <h3 class="product-title">${product.name}</h3>
                            <p class="product-desc">${product.desc}</p>
                            <div class="price-row">
                                <p class="price">180 MDL</p>
                                ${buttonHtml}
                            </div>
                        </div>
                    `;
                    container.appendChild(card);
                }
            });
        }

        // Логика фильтров по кнопкам "Все" / "В наличии" / "Нет в наличии"
        function setFilter(filterType) {
            currentFilter = filterType;
            
            // Смена активного класса у кнопок
            document.getElementById('btn-all').classList.remove('active');
            document.getElementById('btn-instock').classList.remove('active');
            document.getElementById('btn-outofstock').classList.remove('active');
            
            document.getElementById(`btn-${filterType}`).classList.add('active');
            
            renderCatalog();
        }

        // Логика живого поиска
        function filterProducts() {
            renderCatalog();
        }

        // Скролл к корзине по клику на кнопку
        function scrollToCart() {
            document.getElementById('cart-anchor').scrollIntoView({ behavior: 'smooth' });
        }

        // Добавление в корзину
        function addToCart(flavorName) {
            cart.push(flavorName);
            document.getElementById('nav-cart-count').innerText = cart.length;
            renderCart();
        }

        // Удаление из корзины
        function removeFromCart(index) {
            cart.splice(index, 1);
            document.getElementById('nav-cart-count').innerText = cart.length;
            renderCart();
        }

        // Расчет стоимости
        function calculateTotal() {
            const count = cart.length;
            const pricePerUnit = count >= 2 ? 170 : 180;
            let itemsTotal = count * pricePerUnit;
            
            const deliveryMethod = document.getElementById('delivery').value;
            if (deliveryMethod === "Доставка по Кишиневу") {
                itemsTotal += 50;
            }
            
            return {
                itemsTotal: itemsTotal,
                currentUnitPrice: pricePerUnit
            };
        }

        // Отрисовка корзины
        function renderCart() {
            const listContainer = document.getElementById('cart-list');
            listContainer.innerHTML = '';
            
            if (cart.length === 0) {
                listContainer.innerHTML = '<p style="color: #8e8e93; font-style: italic;">Корзина пуста</p>';
                document.getElementById('cart-total').innerText = 'Итого: 0 MDL';
                return;
            }

            const pricing = calculateTotal();

            cart.forEach((item, index) => {
                const itemDiv = document.createElement('div');
                itemDiv.className = 'cart-item';
                itemDiv.innerHTML = `
                    <span>${item} — <b>${pricing.currentUnitPrice} MDL</b></span>
                    <button class="delete-btn" onclick="removeFromCart(${index})">❌</button>
                `;
                listContainer.appendChild(itemDiv);
            });

            document.getElementById('cart-total').innerText = `Итого: ${pricing.itemsTotal} MDL`;
        }

        // Отправка заказа в бот
        function sendOrder() {
            const contactInput = document.getElementById('contact').value.trim();
            const deliveryMethod = document.getElementById('delivery').value;

            if (cart.length === 0) {
                alert('Сначала добавьте товар в корзину!');
                return;
            }
            if (!contactInput) {
                alert('Пожалуйста, укажите контакт для связи!');
                return;
            }

            const pricing = calculateTotal();
            const itemsList = cart.map(item => ({
                name: item,
                price: pricing.currentUnitPrice
            }));

            const orderData = {
                items: itemsList,
                total_price: pricing.itemsTotal,
                delivery: deliveryMethod,
                contact: contactInput
            };

            tg.sendData(JSON.stringify(orderData));
            tg.close();
        }

        // Инициализация при первой загрузке страницы
        renderCatalog();
    </script>
</body>
</html>
